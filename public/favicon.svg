<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#020510"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Inner hexagon shape -->
  <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.05)" stroke-opacity="0.6"/>
  <!-- Neural node center -->
  <circle cx="32" cy="32" r="5" fill="#00d4ff" fill-opacity="0.9"/>
  <circle cx="32" cy="32" r="8" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Neural connections -->
  <line x1="32" y1="12" x2="32" y2="24" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="32" y1="40" x2="32" y2="52" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="12" y1="22" x2="25" y2="28" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="52" y1="22" x2="39" y2="28" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="12" y1="42" x2="25" y2="36" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="52" y1="42" x2="39" y2="36" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Corner nodes -->
  <circle cx="32" cy="11" r="2.5" fill="#a855f7" fill-opacity="0.9"/>
  <circle cx="32" cy="53" r="2.5" fill="#a855f7" fill-opacity="0.9"/>
  <circle cx="11" cy="21" r="2.5" fill="#10b981" fill-opacity="0.9"/>
  <circle cx="53" cy="21" r="2.5" fill="#10b981" fill-opacity="0.9"/>
  <circle cx="11" cy="43" r="2.5" fill="#10b981" fill-opacity="0.9"/>
  <circle cx="53" cy="43" r="2.5" fill="#10b981" fill-opacity="0.9"/>
  <!-- R letter subtle -->
  <text x="28" y="36" font-family="monospace" font-size="10" font-weight="bold" fill="#00d4ff" fill-opacity="0.95">R</text>
</svg>
